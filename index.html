<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品查询系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px;text-align:center}
.header h1{font-size:24px;margin-bottom:10px}
.search-box{display:flex;gap:10px;max-width:600px;margin:0 auto}
.search-box input{flex:1;padding:12px;border:none;border-radius:25px;font-size:16px}
.search-box button{padding:12px 24px;background:white;color:#667eea;border:none;border-radius:25px;cursor:pointer;font-weight:bold}
.stats{background:white;padding:15px;text-align:center}
.stats span{color:#667eea;font-weight:bold}
.categories{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:white;justify-content:center}
.cat-btn{padding:8px 16px;border:1px solid #ddd;border-radius:20px;background:white;cursor:pointer;font-size:14px}
.cat-btn.active{background:#667eea;color:white;border-color:#667eea}
.container{max-width:1200px;margin:0 auto;padding:10px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.product-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;transition:transform 0.2s}
.product-card:hover{transform:translateY(-5px)}
.product-image{width:100%;height:200px;object-fit:cover;background:#f0f0f0}
.product-info{padding:15px}
.product-code{font-weight:bold;color:#333;font-size:16px;margin-bottom:8px}
.product-category{color:#667eea;font-size:14px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000}
.modal.show{display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:white;border-radius:16px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;padding:15px 20px;background:#667eea;color:white}
.modal-close{background:none;border:none;color:white;font-size:28px;cursor:pointer}
.modal-body{padding:20px}
.detail-section{margin-bottom:20px}
.detail-section h3{color:#667eea;margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid #667eea}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.detail-item{padding:8px;background:#f9f9f9;border-radius:8px}
.detail-label{font-size:12px;color:#999;margin-bottom:3px}
.detail-value{font-size:14px;color:#333}
.detail-images img{max-width:300px;max-height:300px;border-radius:8px;margin:10px}
.reset-btn{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:#667eea;color:white;border:none;border-radius:25px;cursor:pointer}
.password-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.password-overlay.hide{display:none}
.password-box{background:white;padding:40px;border-radius:16px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.3);max-width:400px;width:90%}
.password-box h2{color:#333;margin-bottom:20px;font-size:24px}
.password-box input{width:100%;padding:15px;border:2px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:15px;text-align:center}
.password-box button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold}
.password-box button:hover{opacity:0.9}
.password-box .error{color:#e74c3c;margin-top:10px;font-size:14px;display:none}
.password-box .tip{color:#999;margin-top:15px;font-size:12px}
</style>
</head>
<body>
<div class="password-overlay" id="passwordOverlay">
<div class="password-box">
<h2>🔒 产品查询系统</h2>
<input type="password" id="passwordInput" placeholder="请输入访问密码">
<button id="loginBtn">进入系统</button>
<div class="error" id="passwordError">密码错误，请重试</div>
<div class="tip">请联系管理员获取密码</div>
</div>
</div>
<div class="header">
<h1>产品查询系统</h1>
<div class="search-box">
<input type="text" id="searchInput" placeholder="输入货号、卖点等关键词...">
<button id="searchBtn">搜索</button>
</div>
</div>
<div class="stats" id="stats"></div>
<div class="categories" id="categories"></div>
<div class="container">
<div class="product-grid" id="productGrid"></div>
</div>
<button class="reset-btn" id="resetBtn">重置</button>
<div class="modal" id="modal">
<div class="modal-content">
<div class="modal-header">
<span id="modalTitle">商品详情</span>
<button class="modal-close" id="modalClose">&times;</button>
</div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>

let currentKeyword = "", currentCategory = "";
const categories = [...new Set(products.map(function(p){return p.sheet}).filter(Boolean))].sort();

function checkPassword() {
    var input = document.getElementById("passwordInput").value;
    if (input === CORRECT_PASSWORD) {
        document.getElementById("passwordOverlay").classList.add("hide");
        localStorage.setItem("productQueryAuth", "true");
    } else {
        document.getElementById("passwordError").style.display = "block";
        document.getElementById("passwordInput").value = "";
    }
}

document.getElementById("loginBtn").addEventListener("click", checkPassword);
document.getElementById("passwordInput").addEventListener("keypress", function(e){if(e.key==="Enter")checkPassword()});

if (localStorage.getItem("productQueryAuth") === "true") {
    document.getElementById("passwordOverlay").classList.add("hide");
}

function init() {
    renderCategories();
    renderProducts(products);
}

function renderCategories() {
    var c = document.getElementById("categories");
    c.innerHTML = '<button class="cat-btn active" id="btn-all">全部</button>';
    categories.forEach(function(cat){
        c.innerHTML += '<button class="cat-btn">' + cat + "</button>";
    });
    c.querySelectorAll(".cat-btn").forEach(function(btn){
        btn.addEventListener("click", function(){
            selectCategory(this.textContent === "全部" ? "" : this.textContent);
        });
    });
}

function selectCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll(".cat-btn").forEach(function(b){
        b.classList.toggle("active", (cat === "" && b.id === "btn-all") || b.textContent === cat);
    });
    doFilter();
}

function doSearch() {
    currentKeyword = document.getElementById("searchInput").value.trim();
    doFilter();
}

document.getElementById("searchBtn").addEventListener("click", doSearch);
document.getElementById("searchInput").addEventListener("keypress", function(e){if(e.key==="Enter")doSearch()});
document.getElementById("resetBtn").addEventListener("click", function(){
    currentKeyword="";currentCategory="";
    document.getElementById("searchInput").value="";
    document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.toggle("active",b.id==="btn-all")});
    renderProducts(products);
});

function doFilter() {
    var result = products;
    if (currentKeyword) {
        var kw = currentKeyword.toLowerCase();
        result = result.filter(function(p){return(p.code&&p.code.toLowerCase().includes(kw))||(p.highlight&&p.highlight.toLowerCase().includes(kw))||(p.material&&p.material.toLowerCase().includes(kw))});
    }
    if (currentCategory) result = result.filter(function(p){return p.sheet === currentCategory});
    renderProducts(result);
}

function renderProducts(list) {
    document.getElementById("stats").innerHTML = "共 <span>463</span> 个，当前 <span>" + list.length + "</span> 个";
    var grid = document.getElementById("productGrid");
    if (list.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:50px;color:#999">未找到匹配的商品</div>';
        return;
    }
    var html = "";
    list.forEach(function(p) {
        var idx = products.indexOf(p);
        var img = p.package_image && p.package_image.startsWith('data:') ? '<img class="product-image" src="' + p.package_image + '">' : '<div class="product-image" style="display:flex;align-items:center;justify-content:center;color:#999">暂无图片</div>';
        html += '<div class="product-card" data-idx="' + idx + '">' + img + '<div class="product-info"><div class="product-code">' + (p.code||"-") + '</div><div class="product-category">' + (p.sheet||"-") + '</div></div></div>';
    });
    grid.innerHTML = html;
    grid.querySelectorAll(".product-card").forEach(function(card){
        card.addEventListener("click", function(){showDetail(parseInt(this.getAttribute("data-idx")))});
    });
}

function showDetail(idx) {
    var p = products[idx];
    var html = '<div class="detail-section"><h3>基本信息</h3><div class="detail-grid">';
    html += '<div class="detail-item"><div class="detail-label">款式编码</div><div class="detail-value">' + (p.code||"-") + '</div></div>';
    html += '<div class="detail-item"><div class="detail-label">商品大类</div><div class="detail-value">' + (p.sheet||"-") + '</div></div>';
    html += '<div class="detail-item"><div class="detail-label">材质</div><div class="detail-value">' + (p.material||"-") + '</div></div>';
    html += '<div class="detail-item"><div class="detail-label">商品等级</div><div class="detail-value">' + (p.level||"-") + '</div></div></div></div>';
    if (p.highlight) html += '<div class="detail-section"><h3>卖点信息</h3><div class="detail-item"><div class="detail-label">核心卖点</div><div class="detail-value">' + p.highlight + '</div></div></div>';
    html += '<div class="detail-section"><h3>包装信息</h3><div class="detail-grid">';
    html += '<div class="detail-item"><div class="detail-label">包装方式</div><div class="detail-value">' + (p.package||"-") + '</div></div>';
    html += '<div class="detail-item"><div class="detail-label">包装款式编码</div><div class="detail-value">' + (p.package_code||"-") + '</div></div></div>';
    if (p.package_detail) html += '<div class="detail-item" style="margin-top:10px"><div class="detail-label">包装辅料明细</div><div class="detail-value">' + p.package_detail + '</div></div>';
    html += '</div>';
    if (p.package_image && p.package_image.startsWith('data:')) html += '<div class="detail-section"><h3>商品图片</h3><div class="detail-images"><img src="' + p.package_image + '"></div></div>';
    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("modalTitle").textContent = p.code || "详情";
    document.getElementById("modal").classList.add("show");
}

document.getElementById("modalClose").addEventListener("click", function(){document.getElementById("modal").classList.remove("show")});
document.getElementById("modal").addEventListener("click", function(e){if(e.target===this)this.classList.remove("show")});

init();
</script>
